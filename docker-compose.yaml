services:
  # Model owner: holds the KB-Whisper pipeline and serves the OpenAI-compatible
  # /v1/audio/transcriptions endpoint. This is the only process that loads the model and the
  # single gate on the GPU (requests serialize via an in-process lock).
  whisper-server:
    image: ghcr.io/jswetzen/webdav-transcriber:main
    # build: .  # uncomment to build locally instead
    command: ["whisperwebdav-server"]   # this is also the image default
    restart: unless-stopped
    # PyTorch DataLoader workers serialize tensors via /dev/shm; the 64 MB container default
    # triggers "RuntimeError: unable to allocate shared memory(shm)" mid-transcription.
    shm_size: "2gb"
    ports:
      - "8000:8000"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      # Optional bearer key required on requests (and sent by the poller below).
      # API_KEY: "change-me"

      TRANSCRIPTION_MODEL: "KBLab/kb-whisper-large"
      EMISSIONS_MODEL: "KBLab/wav2vec2-large-voxrex-swedish"
      VAD_MODEL: "silero"
      LANGUAGE: "sv"
      CACHE_DIR: "/app/models"
      GPU_ENABLED: "false"     # set "true" + a GPU block below
      LOG_LEVEL: "INFO"
    volumes:
      - model-cache:/app/models
      # GPU path B (Podman / bare LXC) — uncomment with the devices block below:
      # - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1:ro
      # - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
      # - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:ro
    # --- GPU path A: Docker + NVIDIA Container Toolkit (also set GPU_ENABLED: "true") ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # --- GPU path B: Podman / bare LXC (also set GPU_ENABLED: "true" + the volume mounts) ---
    # devices:
    #   - /dev/nvidia0
    #   - /dev/nvidiactl
    #   - /dev/nvidia-uvm

  # Thin client: polls a WebDAV share for voice notes and offloads transcription to
  # whisper-server (TRANSCRIBE_BACKEND=http). Loads no model, needs no GPU. Optional — drop
  # this service if you only want the OpenAI endpoint.
  whisper-poller:
    image: ghcr.io/jswetzen/webdav-transcriber:main
    command: ["whisperwebdav"]
    restart: unless-stopped
    depends_on:
      - whisper-server
    environment:
      TRANSCRIBE_BACKEND: "http"
      TRANSCRIBE_SERVER_URL: "http://whisper-server:8000"
      # API_KEY: "change-me"   # must match whisper-server if set

      WEBDAV_URL: "https://your-webdav-server.example.com"
      WEBDAV_USERNAME: "your_username"
      WEBDAV_PASSWORD: "your_password"
      WEBDAV_WATCH_PATH: "/recordings"
      POLL_INTERVAL_SECONDS: "60"
      LANGUAGE: "sv"
      OUTPUT_FORMATS: "txt,srt"
      # OUTPUT_SUBDIR: "transcripts"
      # APPRISE_URLS: "slack://TokenA/TokenB/TokenC"
      LOG_LEVEL: "INFO"

volumes:
  model-cache:
